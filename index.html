<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Room Locator</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #fff8b5, #d9f99d, #22c55e);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 650px;
      background: #ffffff;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0, 80, 30, 0.25);
      text-align: center;
      border: 4px solid #facc15;
    }

    h1 {
      color: #166534;
      margin-bottom: 20px;
      font-size: 2.3rem;
      letter-spacing: 1px;
    }

    .search-box {
      width: 100%;
      padding: 14px 16px;
      margin-bottom: 25px;
      border: 2px solid #84cc16;
      border-radius: 12px;
      font-size: 1rem;
      outline: none;
      transition: 0.3s;
    }

    .search-box:focus {
      border-color: #16a34a;
      box-shadow: 0 0 8px rgba(34, 197, 94, 0.4);
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
    }

    .room-link {
      text-decoration: none;
    }

    .room-button {
      width: 100%;
      padding: 18px;
      background: #facc15;
      color: #14532d;
      border: none;
      border-radius: 14px;
      font-size: 1.2rem;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 5px 12px rgba(22, 101, 52, 0.2);
    }

    .room-button:hover {
      background: #22c55e;
      color: #ffffff;
      transform: translateY(-3px);
    }

    .hidden {
      display: none;
    }

    .no-results {
      display: none;
      color: #166534;
      font-weight: bold;
      margin-top: 20px;
    }

    @media (max-width: 600px) {
      .container {
        padding: 22px;
      }

      h1 {
        font-size: 1.8rem;
      }

      .button-grid {
        grid-template-columns: 1fr;
      }

      .room-button {
        font-size: 1rem;
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Room Locator</h1>

    <input
      type="text"
      id="searchInput"
      class="search-box"
      placeholder="Search room, e.g. H202"
      onkeyup="searchRooms()"
    />

    <div class="button-grid" id="roomButtons">
      <a href="https://example.com/H202" target="_blank" class="room-link" data-room="H202">
        <button class="room-button">H202</button>
      </a>

      <a href="http://172.31.7.243/capcara/cara/user/onsite_cara/3d35b0cebbe9768b87c93a495c4c622a" target="_blank" class="room-link" data-room="H212">
        <button class="room-button">H212</button>
      </a>

      <a href="https://example.com/H205" target="_blank" class="room-link" data-room="H205">
        <button class="room-button">H205</button>
      </a>

      <a href="http://172.31.7.243/capcara/cara/user/onsite_cara/96b1dca8de20d2338db2eb81ce8439d3" target="_blank" class="room-link" data-room="H306">
        <button class="room-button">H306</button>
      </a>

      <a href="http://172.31.7.243/capcara/cara/user/onsite_cara/3b51ae72a2dd5b83b1ed76dcd148b3c4" target="_blank" class="room-link" data-room="H308">
        <button class="room-button">H308</button>
      </a>

      <a href="https://example.com/H310" target="_blank" class="room-link" data-room="H310">
        <button class="room-button">H310</button>
      </a>
    </div>

    <p class="no-results" id="noResults">No room found.</p>
  </div>

  <script>
    function searchRooms() {
      const input = document.getElementById("searchInput").value.toUpperCase();
      const rooms = document.querySelectorAll(".room-link");
      const noResults = document.getElementById("noResults");
      let visibleCount = 0;

      rooms.forEach(room => {
        const roomName = room.getAttribute("data-room");

        if (roomName.includes(input)) {
          room.classList.remove("hidden");
          visibleCount++;
        } else {
          room.classList.add("hidden");
        }
      });

      noResults.style.display = visibleCount === 0 ? "block" : "none";
    }
  </script>
</body>
</html>
